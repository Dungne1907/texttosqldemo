<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Chat — Gemini / DeepSeek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Bước 1: ngôn ngữ -->
    <div id="gateLang" class="gate-screen" role="dialog" aria-labelledby="gateLangTitle">
        <div class="gate-card gate-card--narrow">
            <h2 id="gateLangTitle" class="gate-title" data-i18n="gateLangTitle">Chọn ngôn ngữ</h2>
            <p class="gate-lead" data-i18n="gateLangSubtitle">Chọn Tiếng Việt hoặc English để tiếp tục.</p>
            <div class="gate-lang-buttons">
                <button type="button" id="pickLangVi" class="gate-btn gate-btn--primary" data-i18n="langVi">Tiếng Việt</button>
                <button type="button" id="pickLangEn" class="gate-btn gate-btn--outline" data-i18n="langEn">English</button>
            </div>
        </div>
    </div>

    <!-- Bước 2: hướng dẫn -->
    <div id="gateGuide" class="gate-screen hidden" role="dialog" aria-labelledby="gateGuideTitle">
        <div class="gate-card gate-card--wide">
            <h2 id="gateGuideTitle" class="gate-title" data-i18n="gateGuideTitle">Hướng dẫn sử dụng</h2>
            <div class="guide-body">
                <p data-i18n="gateGuideIntro"></p>
                <ol class="guide-steps">
                    <li data-i18n="gateGuideStep1"></li>
                    <li data-i18n="gateGuideStep2"></li>
                    <li data-i18n="gateGuideStep3"></li>
                    <li data-i18n="gateGuideStep4"></li>
                </ol>
            </div>
            <button type="button" id="guideOkBtn" class="gate-btn gate-btn--primary gate-btn--block" data-i18n="gateGuideOk">OK — Vào ứng dụng</button>
        </div>
    </div>

    <!-- Trang chính -->
    <div id="mainApp" class="hidden">
        <div class="app-wrap">
            <div class="top-bar">
                <h1 id="appTitleHeading" data-i18n="appTitle">Data Chat</h1>
                <div class="top-bar-right">
                    <div class="lang-switch" role="group" aria-label="" id="langSwitchGroup">
                        <button type="button" id="langSwitchVi" class="lang-pill" data-lang="vi" aria-pressed="false">VI</button>
                        <button type="button" id="langSwitchEn" class="lang-pill" data-lang="en" aria-pressed="false">EN</button>
                    </div>
                    <div class="provider-row">
                        <label for="providerSelect" id="apiLabelEl" data-i18n="apiLabel">API:</label>
                        <select id="providerSelect" aria-label="">
                            <option value="deepseek">DeepSeek</option>
                            <option value="gemini">Gemini</option>
                        </select>
                    </div>
                </div>
            </div>
            <p id="hintBox" class="hint-box"></p>

            <div class="chat-app">
                <button type="button" id="panelToggle" class="panel-toggle" aria-expanded="true">▼ Nạp dữ liệu (CSV / ZIP)</button>
                <div id="dataPanel" class="data-panel">
                    <h2 id="dataPanelTitleEl" data-i18n="dataPanelTitle">Dữ liệu của bạn</h2>
                    <p id="dataPanelSubtitleEl" class="subtitle-small" data-i18n="dataPanelSubtitle"></p>
                    <div class="toolbar-actions data-upload-row">
                        <label class="data-file-label"><span id="dataFileLabelEl" data-i18n="fileLabel">CSV hoặc ZIP</span> <input id="dataFile" type="file" accept=".csv,.zip"></label>
                        <button id="loadDataBtn" type="button" data-i18n="loadDataBtn">Nạp dữ liệu</button>
                    </div>
                    <p id="dataStatusText" class="data-status"></p>
                </div>

                <div id="chatMessages" class="chat-messages" role="log" aria-live="polite"></div>

                <section class="chat-examples" id="examplesSection" aria-label="">
                    <span id="examplesLabelEl" class="examples-label" data-i18n="examplesLabel">Ví dụ câu hỏi</span>
                    <div class="example-chips">
                        <button type="button" class="example-chip" data-i18n="chip1"></button>
                        <button type="button" class="example-chip" data-i18n="chip2"></button>
                        <button type="button" class="example-chip" data-i18n="chip3"></button>
                    </div>
                </section>

                <footer class="chat-composer">
                    <label class="sr-only" for="questionInput" id="questionLabelEl" data-i18n="questionAria">Câu hỏi</label>
                    <textarea id="questionInput" rows="2" placeholder=""></textarea>
                    <div class="composer-actions">
                        <button type="button" id="sendBtn" class="btn-send" data-i18n="sendBtn">Gửi</button>
                        <button type="button" id="clearChatBtn" data-i18n="clearChatBtn">Xóa hội thoại</button>
                    </div>
                    <p id="statusText" class="composer-status"></p>
                </footer>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://sql.js.org/dist/sql-wasm.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
